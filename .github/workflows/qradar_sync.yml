name: QRadar API Sync

on:
  push:
    paths:
      - 'qradar/**'
      - 'scripts/**'
  workflow_dispatch: # Əllə işə salmaq üçün düymə

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Repo-nu kopyala
        uses: actions/checkout@v3

      - name: Python-u quraşdır
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Kitabxanaları yüklə
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: QRadar API vasitəsilə Yeniləmə (Update)
        env:
          QRADAR_URL: ${{ secrets.QRADAR_URL }}
          QRADAR_TOKEN: ${{ secrets.QRADAR_TOKEN }}
        run: python scripts/sync_qradar_ui.py
