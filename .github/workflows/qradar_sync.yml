name: QRadar UI Robot Sync

on:
  push:
    paths:
      - 'qradar/**'
      - 'scripts/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Repo-nu kopyala
        uses: actions/checkout@v3

      - name: Python-u quraşdır
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Kitabxanaları və Brauzeri yüklə
        run: |
          pip install -r requirements.txt
          # Playwright-in işləməsi üçün lazım olan sistem faylları və Chrome
          npx playwright install --with-deps chromium

      - name: Robotu işə sal
        env:
          QRADAR_URL: ${{ secrets.QRADAR_URL }}
          QRADAR_USER: ${{ secrets.QRADAR_USER }}
          QRADAR_PASS: ${{ secrets.QRADAR_PASS }}
        run: python scripts/sync_qradar_ui.py
