name: QRadar Detection Sync
on:
  push:
    paths:
      - 'qradar/**'  # Yalnız bu qovluq dəyişəndə tetiklənir

jobs:
  deploy-qradar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

   - name: Run QRadar Deploy Script
        env:
          QRADAR_URL: ${{ secrets.QRADAR_URL }}   # Düzgün Secret adı budur
          QRADAR_TOKEN: ${{ secrets.QRADAR_TOKEN }} # Düzgün Secret adı budur
        run: python scripts/sync_qradar.py
