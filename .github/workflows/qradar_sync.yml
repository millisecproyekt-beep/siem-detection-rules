name: QRadar-Sync

on:
  push:
    paths:
      - 'qradar/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set-up-Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install-Requests
        run: pip install requests

      - name: Run-Script
        env:
          QRADAR_URL: ${{ secrets.QRADAR_URL }}
          QRADAR_TOKEN: ${{ secrets.QRADAR_TOKEN }}
        run: python scripts/sync_qradar.py
