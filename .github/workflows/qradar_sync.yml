name: Splunk-Sync

on:
  push:
    paths:
      - 'splunk/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set-up-Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install-Requests
        run: pip install requests

      - name: Run-Splunk-Script
        env:
          # Secret adlarını sənin şəkildəki adlara uyğunlaşdırdıq
          SPLUNK_URL: ${{ secrets.SPLUNK_URL }}
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
        run: python scripts/sync_splunk.py
