name: QRadar UI Robot Sync

on:
  push:
    paths:
      - 'qradar/**'
      - 'scripts/**'
  workflow_dispatch: # Bu sətir sənə Actions tabında "Run workflow" düyməsini verəcək ki, əllə işə sala biləsən.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Repo-nu kopyala
        uses: actions/checkout@v3

      - name: Python-u quraşdır
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Kitabxanaları yüklə
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Playwright Brauzerini Yüklə (Ən Vacib Addım)
        run: playwright install --with-deps chromium

      - name: Robotu işə sal
        env:
          QRADAR_URL: ${{ secrets.QRADAR_URL }}
          QRADAR_USER: ${{ secrets.QRADAR_USER }}
          QRADAR_PASS: ${{ secrets.QRADAR_PASS }}
        run: python scripts/sync_qradar.py
