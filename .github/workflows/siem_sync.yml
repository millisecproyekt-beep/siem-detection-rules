name: SIEM Detection Sync

# Nə vaxt işə düşsün?
on:
  push:
    branches:
      - main  # Sən main branch-ə nəsə push edəndə (commit edəndə)
    paths:
      - 'splunk/**'  # Yalnız splunk qovluğunda dəyişiklik olanda qaçsın
      - 'scripts/**'

jobs:
  build:
    runs-on: ubuntu-latest # GitHub-ın bizə verdiyi müvəqqəti server

    steps:
    - name: Kodu GitHub-dan götür
      uses: actions/checkout@v3

    - name: Python-u quraşdır
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Lazımi kitabxanaları yüklə (Requests)
      run: pip install requests urllib3

    - name: Sync skriptini işə sal
      env:
        SPLUNK_URL: ${{ secrets.SPLUNK_URL }}
        SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
        QRADAR_URL: ${{ secrets.QRADAR_URL }}
        QRADAR_TOKEN: ${{ secrets.QRADAR_TOKEN }}
      run: python scripts/sync_to_siem.py
