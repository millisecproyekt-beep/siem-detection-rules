name: SIEM Detection Sync

on:
  push:
    branches:
      - main
    paths:
      - 'splunk/**'
      - 'qradar/**'
      - 'scripts/**'

jobs:
  # Vahid Sinxronizasiya İş Akışı (Həm Splunk, həm QRadar üçün)
  siem-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu GitHub-dan gotur
        uses: actions/checkout@v3

      - name: Python-u qurasdir
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Lazimi kitabxanalari yukle
        run: pip install requests urllib3

      - name: SİEM Sinxronizasiyasini ise sal
        env:
          # Splunk üçün lazım olan secret-lər (Toxunulmadı)
          SPLUNK_URL: ${{ secrets.SPLUNK_URL }}
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
          
          # QRadar üçün lazım olan secret-lər (API rejiminə keçirildi)
          QRADAR_URL: ${{ secrets.QRADAR_URL }}
          QRADAR_TOKEN: ${{ secrets.QRADAR_TOKEN }}
        run: python scripts/sync_to_siem.py
