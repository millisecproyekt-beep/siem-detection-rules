name: SIEM Detection Sync

on:
  push:
    # Bütün budaqlar və bütün qovluqlar üçün işləsin (test üçün)
    branches: ["*"] 

jobs:
  siem-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu GitHub-dan gotur
        uses: actions/checkout@v3

      - name: Python-u qurasdir
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Lazimi kitabxanalari yukle
        run: pip install requests urllib3

      - name: SIEM Sinxronizasiyasini ise sal
        env:
          SPLUNK_URL: ${{ secrets.SPLUNK_URL }}
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
          QRADAR_URL: ${{ secrets.QRADAR_URL }}
          QRADAR_TOKEN: ${{ secrets.QRADAR_TOKEN }}
        run: python scripts/sync_to_siem.py
