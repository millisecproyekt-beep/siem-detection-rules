name: Splunk-Detection-Sync

on:
  push:
    # Test m…ôrh…ôl…ôsind…ô 'paths' filtrini m√ľv…ôqq…ôti bańülaya bil…ôrs…ôn
    # Amma qalsńĪn deyirs…ôns…ô, m√ľtl…ôq splunk/ qovluńüuna fayl at.

jobs:
  deploy-splunk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Splunk Deploy Script
        env:
          # Secret adńĪnńĪ SPLUNK_URL etdim (S…ônd…ô bel…ô idi)
          SPLUNK_URL: ${{ secrets.SPLUNK_URL }}
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
        run: python scripts/sync_splunk.py
